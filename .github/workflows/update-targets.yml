name: Update Targets

on:
  workflow_call:
    inputs:
      packages:
        description: "Space-separated packages to update. Empty means all discoverable packages."
        required: false
        type: string
        default: ""
      inputs:
        description: "Space-separated flake inputs to update. Empty means all root inputs."
        required: false
        type: string
        default: ""
      pr-labels:
        description: "Comma-separated labels added to update pull requests."
        required: false
        type: string
        default: "dependencies,automated"
      auto-merge:
        description: "Whether to merge an update pull request immediately."
        required: false
        type: boolean
        default: false
    secrets:
      AUTOMATION_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discovery.outputs.matrix }}
      has-updates: ${{ steps.discovery.outputs.has-updates }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Build update matrix
        id: discovery
        env:
          PACKAGES: ${{ inputs.packages }}
          INPUTS: ${{ inputs.inputs }}
        run: ./.github/ci/discovery.py

  update:
    needs: discover
    if: needs.discover.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Create automation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare update branch
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: ./.github/ci/prepare_update_branch.py "${{ matrix.type }}" "${{ matrix.name }}"
      - name: Update target
        id: update
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NIXPKGS_ALLOW_UNFREE: "1"
          NIX_UPDATE_SYSTEM: ${{ matrix.system }}
        run: ./.github/ci/update.py "${{ matrix.type }}" "${{ matrix.name }}"
      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        env:
          AUTO_MERGE: ${{ inputs.auto-merge }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_LABELS: ${{ inputs.pr-labels }}
        run: >-
          ./.github/ci/create_pr.py
          "${{ matrix.type }}"
          "${{ matrix.name }}"
          "${{ matrix.current_version }}"
          "${{ steps.update.outputs.new_version }}"

  summary:
    needs: [discover, update]
    if: always() && needs.discover.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write update summary
        run: |
          {
            echo "## Update Summary"
            echo
            echo "- Auto-merge requested: \`${{ inputs.auto-merge }}\`"
            echo "- Discovery: \`${{ needs.discover.result }}\`"
            echo "- Updates: \`${{ needs.update.result }}\`"
          } >>"$GITHUB_STEP_SUMMARY"
