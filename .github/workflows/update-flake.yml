name: Update Flake

on:
  workflow_call:
    inputs:
      packages:
        description: "Space-separated packages to update. Empty means all discoverable packages."
        required: false
        type: string
        default: ""
      inputs:
        description: "Space-separated flake inputs to update. Empty means all root inputs."
        required: false
        type: string
        default: ""
      pr-labels:
        description: "Comma-separated labels added to update PRs."
        required: false
        type: string
        default: "dependencies,automated"
      auto-merge:
        description: "Reserved for callers that enable repository auto-merge policy."
        required: false
        type: boolean
        default: false
    secrets:
      NUR_UPDATE_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discovery.outputs.matrix }}
      has-updates: ${{ steps.discovery.outputs.has-updates }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Build update matrix
        id: discovery
        env:
          PACKAGES: ${{ inputs.packages }}
          INPUTS: ${{ inputs.inputs }}
          SYSTEM: x86_64-linux
        run: python3 .github/ci/discovery.py

  update:
    needs: discover
    if: needs.discover.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.NUR_UPDATE_TOKEN || github.token }}
          fetch-depth: 0
      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare update branch
        env:
          TARGET_TYPE: ${{ matrix.type }}
          TARGET_NAME: ${{ matrix.name }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          branch="automation/update-${TARGET_TYPE}-${TARGET_NAME}"
          git fetch origin "$BASE_BRANCH"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null; then
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
            if ! git rebase "origin/$BASE_BRANCH"; then
              echo "::warning::Cannot rebase $branch; rebuilding it from $BASE_BRANCH"
              git rebase --abort || true
              git reset --hard "origin/$BASE_BRANCH"
            fi
          else
            git checkout -B "$branch" "origin/$BASE_BRANCH"
          fi
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Update target
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.NUR_UPDATE_TOKEN || github.token }}
          NIXPKGS_ALLOW_UNFREE: "1"
          TARGET_TYPE: ${{ matrix.type }}
          TARGET_NAME: ${{ matrix.name }}
          CURRENT_VERSION: ${{ matrix.current_version }}
        run: |
          set -euo pipefail

          if [[ "$TARGET_TYPE" == "package" ]]; then
            ./scripts/update-packages.sh "$TARGET_NAME"
          else
            nix flake update "$TARGET_NAME"
          fi

          nix run .#formatter -- --no-cache
          nix flake check --impure --no-build --show-trace

          if git diff --quiet; then
            echo "updated=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TARGET_TYPE" == "package" ]]; then
            new_version="$(nix eval --raw --impure ".#packages.x86_64-linux.${TARGET_NAME}.version")"
            title="${TARGET_NAME}: ${CURRENT_VERSION} -> ${new_version}"
          else
            new_version="$(
              python3 - "$TARGET_NAME" <<'PY'
          import json
          import sys
          from pathlib import Path

          name = sys.argv[1]
          lock = json.loads(Path("flake.lock").read_text())
          locked = lock.get("nodes", {}).get(name, {}).get("locked", {})
          print(str(locked.get("rev") or locked.get("lastModified") or "unknown")[:8])
          PY
            )"
            title="flake.lock: update ${TARGET_NAME}"
          fi

          {
            echo "updated=true"
            echo "new_version=$new_version"
            echo "title=$title"
          } >>"$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.NUR_UPDATE_TOKEN || github.token }}
          branch: automation/update-${{ matrix.type }}-${{ matrix.name }}
          delete-branch: true
          commit-message: ${{ steps.update.outputs.title }}
          title: ${{ steps.update.outputs.title }}
          body: |
            Automated update generated by `.github/workflows/update-flake.yml`.

            - Type: `${{ matrix.type }}`
            - Name: `${{ matrix.name }}`
            - Previous: `${{ matrix.current_version }}`
            - Current: `${{ steps.update.outputs.new_version }}`
            - Auto-merge requested: `${{ inputs.auto-merge }}`
          labels: ${{ inputs.pr-labels }}
