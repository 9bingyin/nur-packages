name: Update Dependencies

on:
  schedule:
    - cron: "0 0,4,18,21 * * *"
  workflow_dispatch:
    inputs:
      packages:
        description: "Specific packages to update, separated by spaces. Empty means all discoverable packages."
        required: false
        default: ""
      inputs:
        description: "Specific flake inputs to update, separated by spaces. Empty means all root inputs."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: update-dependencies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    uses: ./.github/workflows/update-flake.yml
    with:
      packages: ${{ github.event.inputs.packages || '' }}
      inputs: ${{ github.event.inputs.inputs || '' }}
      pr-labels: "dependencies,automated"
      auto-merge: true
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
