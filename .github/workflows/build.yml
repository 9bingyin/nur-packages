name: Build and populate cache

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "51 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: Flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Run flake checks
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: nix flake check --impure --no-build --show-trace

  nur-build:
    name: NUR eval/build (${{ matrix.nixpkgs }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nixpkgs:
          - nixpkgs-unstable
          - nixos-unstable
          - nixos-25.11
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/${{ matrix.nixpkgs }}.tar.gz
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Show nixpkgs version
        run: nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'
      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: 9bingyin
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check NUR evaluation
        run: |
          nix-env -f . -qa '*' --meta --xml \
            --allowed-uris https://static.rust-lang.org \
            --option restrict-eval true \
            --option allow-import-from-derivation true \
            --drv-path --show-trace \
            -I "nixpkgs=$(nix-instantiate --find-file nixpkgs)" \
            -I "$PWD" >/dev/null
      - name: Build cacheable NUR outputs
        run: nix shell -f '<nixpkgs>' nix-build-uncached -c nix-build-uncached ci.nix -A cacheOutputs
      - name: Trigger NUR update
        if: github.event_name == 'push' && matrix.nixpkgs == 'nixpkgs-unstable'
        run: curl -XPOST "https://nur-update.nix-community.org/update?repo=9bingyin"

  native-packages:
    name: Native package build (${{ matrix.system }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-latest
            system: aarch64-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Build native packages
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          SYSTEM: ${{ matrix.system }}
        run: |
          set -euo pipefail

          packages="$(nix eval --json --impure ".#packages.${SYSTEM}" --apply '
            pkgs:
              builtins.filter
                (name: name != "default" && name != "formatter")
                (builtins.attrNames pkgs)
          ' | jq -r '.[]')"

          for package in $packages; do
            echo "::group::Build $package on $SYSTEM"
            nix build --impure --no-link ".#packages.${SYSTEM}.${package}"
            echo "::endgroup::"
          done
