name: Build and populate cache

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "51 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-packages:
    name: Native package build (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    env:
      NIKS3_SERVER: https://niks3.bingyin.org
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin
    steps:
      - uses: actions/checkout@v7
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://9bingyin.cachix.org https://cache.bingyin.org
            extra-trusted-public-keys = 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo= cache.bingyin.org-1:PU5qCuJfhYPKSIRdOMCndVB6Dn9rRRIRVZAnG2uAPSI=
            access-tokens = github.com=${{ github.token }}
      - name: Build and upload native packages
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          NIXPKGS_ALLOW_UNFREE: "1"
          SYSTEM: ${{ matrix.system }}
        run: ./.github/ci/build_native_packages.py
