name: Build and populate cache

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "51 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: Flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://9bingyin.cachix.org
            extra-trusted-public-keys = 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo=
            access-tokens = github.com=${{ github.token }}
      - name: Run flake checks
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: nix flake check --impure --no-build --show-trace

  nur-eval:
    name: NUR evaluation (${{ matrix.nixpkgs }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nixpkgs:
          - nixpkgs-unstable
          - nixos-unstable
          - nixos-25.11
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/${{ matrix.nixpkgs }}.tar.gz
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://9bingyin.cachix.org
            extra-trusted-public-keys = 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo=
            access-tokens = github.com=${{ github.token }}
      - name: Show nixpkgs version
        run: nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'
      - name: Check NUR evaluation
        run: |
          nix-env -f . -qa '*' --meta --xml \
            --allowed-uris https://static.rust-lang.org \
            --option restrict-eval true \
            --option allow-import-from-derivation true \
            --drv-path --show-trace \
            -I "nixpkgs=$(nix-instantiate --find-file nixpkgs)" \
            -I "$PWD" >/dev/null
      - name: Trigger NUR update
        if: github.event_name == 'push' && matrix.nixpkgs == 'nixpkgs-unstable'
        run: curl -XPOST "https://nur-update.nix-community.org/update?repo=9bingyin"

  native-packages:
    name: Native package build (${{ matrix.system }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-latest
            system: aarch64-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://9bingyin.cachix.org
            extra-trusted-public-keys = 9bingyin.cachix.org-1:uXB+kYLEeHo6kpX8NIZtRwwPozYR/JRNRMeFaObkvDo=
            access-tokens = github.com=${{ github.token }}
      - name: Build native packages missing from cache
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
          SYSTEM: ${{ matrix.system }}
        run: |
          nix shell nixpkgs#nix-fast-build -c nix-fast-build \
            --flake ".#packages.${SYSTEM}" \
            --select 'packages: builtins.removeAttrs packages [ "default" "formatter" ]' \
            --systems "$SYSTEM" \
            --skip-cached \
            --no-nom \
            --no-link
