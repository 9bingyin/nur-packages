name: Auto merge dependency updates

on:
  workflow_run:
    workflows:
      - Build and populate cache
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'automation/update-')
    runs-on: ubuntu-latest
    steps:
      - name: Merge dependency update pull request
        env:
          GH_TOKEN: ${{ secrets.NUR_UPDATE_TOKEN || github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_NUMBER:-}" || "$PR_NUMBER" == "null" ]]; then
            echo "No pull request is associated with this workflow run."
            exit 0
          fi

          pr_json="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json headRefName,isDraft,labels,state,title)"

          head_ref="$(jq -r '.headRefName' <<<"$pr_json")"
          state="$(jq -r '.state' <<<"$pr_json")"
          is_draft="$(jq -r '.isDraft' <<<"$pr_json")"
          labels="$(jq -r '[.labels[].name] | join(",")' <<<"$pr_json")"
          title="$(jq -r '.title' <<<"$pr_json")"

          echo "PR #$PR_NUMBER: $title"
          echo "state=$state head=$head_ref draft=$is_draft labels=$labels"

          if [[ "$state" != "OPEN" || "$is_draft" == "true" ]]; then
            exit 0
          fi

          if [[ "$head_ref" != automation/update-* ]]; then
            echo "Pull request branch is not an automated update branch."
            exit 0
          fi

          if [[ ",$labels," != *",automated,"* || ",$labels," != *",dependencies,"* ]]; then
            echo "Pull request is missing automated/dependencies labels."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch
