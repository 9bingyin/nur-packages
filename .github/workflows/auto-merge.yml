name: Auto Merge Updates

on:
  workflow_run:
    workflows:
      - Build Packages
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: auto-merge-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Create automation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
      - name: Merge successful automated updates
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: ./.github/ci/auto_merge.py
